<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Planner</title>
  <link rel="stylesheet" href="styles.css?v=5">
  <link rel="stylesheet" href="compact-effects.css?v=5">
  <link rel="stylesheet" href="polish.css?v=5">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Planner</p>
      <h1>Vienna</h1>
    </div>
    <div class="actions">
      <button id="saveBtn">Save</button>
      <button id="resetBtn">Reset</button>
    </div>
  </header>

  <nav class="trip-tabs" aria-label="Trips">
    <button class="active">Vienna</button>
    <button disabled>Next trip</button>
  </nav>

  <main>
    <section class="panel intro">
      <h2>Vienna 3-day schedule</h2>
    </section>

    <section id="days" class="days" aria-label="Vienna day schedules"></section>

    <section class="panel options-panel">
      <div class="section-head">
        <p class="eyebrow">Options bank</p>
        <h2>Event options by duration</h2>
      </div>
      <div id="eventOptions" class="option-grid"></div>
    </section>

    <section class="panel options-panel">
      <div class="section-head">
        <p class="eyebrow">Food bank</p>
        <h2>Food options by meal</h2>
      </div>
      <div id="foodOptions" class="option-grid"></div>
    </section>

    <section class="panel options-panel">
      <div class="section-head">
        <p class="eyebrow">Vienna</p>
        <h2>Ice cream + sweet treats by nearby location</h2>
      </div>
      <div id="treatOptions" class="option-grid"></div>
    </section>
  </main>

  <script src="app.js?v=5"></script>
  <script src="maps-enhance.js?v=5"></script>
  <script src="polish.js?v=5"></script>
</body>
</html>
